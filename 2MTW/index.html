<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>モウワスレナーイ
  </title>
  <style>
    body {display: flex; flex-direction: column; align-items: center; background: #ffffff; padding: 20px 0; }
    .clock-card {
      width: 600px;
      margin-bottom: 16px;
      padding: 16px 24px;
      background: #f5f5f5;
      border: 1px solid #dddddd;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      text-align: center;
    }
    #my-clock {
      font-size: 1.8rem;
      font-weight: bold;
      font-family: monospace;
      color: #333;
    }
    .calendar { width: 600px; background: rgb(255, 255, 255); padding: 50px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
   
    /* ヘッダー（月切り替え） */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .header button { padding: 5px 10px; cursor: pointer; }
 
    /* 曜日と日付のグリッド設定（7列） */
    .weekdays, .days { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; }
    .weekdays div { font-weight: bold; padding: 10px 0; color: #666; }
   
    /* 日付のマス目 */
    .days div { padding: 15px 0; border: 1px solid #eee; cursor: pointer; transition: 0.2s; position: relative; }
    .days div:hover:not(.empty) { background: #e0f7fa; }
    .days .empty { border: none; cursor: default; } /* 空白マス */
    .days .today { background: #009688; color: white; font-weight: bold; border-radius: 4px; }
    .days .selected { outline: 3px solid #ff9800; }
    .event-dot {
      position: absolute;
      bottom: 6px;
      left: 50%;
      width: 8px;
      height: 8px;
      background: #f44336;
      border-radius: 50%;
      transform: translateX(-50%);
    }
    .schedule-panel {
      margin-top: 20px;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
      width: 600px;
    }
    .schedule-panel h3 {
      margin-bottom: 10px;
      font-size: 18px;
    }
    .schedule-panel textarea {
      width: 100%;
      min-height: 120px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
      font-size: 14px;
    }
    .schedule-actions {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }
    .schedule-actions button {
      padding: 8px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: #009688;
      color: white;
      transition: 0.2s;
    }
    .schedule-actions button:last-child {
      background: #9e9e9e;
    }
    .schedule-actions button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

<div class="clock-card">
  <div id="my-clock"></div>
</div>
 
<div class="calendar">
  <div class="header">
    <button id="prev">◀先月 </button>
    <h2 id="month-year"></h2>
    <button id="next"> 来月▶</button>
  </div>
  <div class="weekdays">
    <div style="color:red;">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div style="color:blue;">土</div>
  </div>
  <div class="days" id="days-grid"></div>
</div>

<div class="schedule-panel" id="schedule-panel">
  <h3 id="selected-date">日付を選択してください</h3>
  <textarea id="schedule-text" placeholder="ここに予定を書いてください"></textarea>
  <div class="schedule-actions">
    <button id="save-schedule">保存</button>
    <button id="clear-schedule">削除</button>
  </div>
</div>

<script src="time.js"></script>
<script>
  const date = new Date();
  const schedules = {};
  let selectedDayKey = null;
 
  function renderCalendar() {
    const year = date.getFullYear();
    const month = date.getMonth();
 
    document.getElementById('month-year').innerText = `${year}年 ${month + 1}月`;
    const firstDayIndex = new Date(year, month, 1).getDay();
    const lastDay = new Date(year, month + 1, 0).getDate();
    const daysGrid = document.getElementById('days-grid');
    daysGrid.innerHTML = '';
 
    for (let i = 0; i < firstDayIndex; i++) {
      const emptyDiv = document.createElement('div');
      emptyDiv.classList.add('empty');
      daysGrid.appendChild(emptyDiv);
    }
 
    const today = new Date();
    for (let i = 1; i <= lastDay; i++) {
      const dayDiv = document.createElement('div');
      dayDiv.innerText = i;
      const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
      dayDiv.dataset.date = dateKey;
 
      if (i === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
        dayDiv.classList.add('today');
      }
      dayDiv.addEventListener('click', () => selectDay(dayDiv));
      daysGrid.appendChild(dayDiv);
    }
  }
    restoreSelection();
  
 
  function selectDay(dayDiv) {
    if (dayDiv.classList.contains('empty')) return;
    selectedDayKey = dayDiv.dataset.date;
    document.querySelectorAll('.days div').forEach(el => el.classList.toggle('selected', el === dayDiv));
    document.getElementById('selected-date').innerText = `${selectedDayKey} の予定`;
    document.getElementById('schedule-text').value = schedules[selectedDayKey] || '';
  }
 
  function restoreSelection() {
    if (!selectedDayKey) return;
    const selectedDiv = document.querySelector(`.days div[data-date="${selectedDayKey}"]`);
    if (selectedDiv) {
      selectedDiv.classList.add('selected');
    } else {
      selectedDayKey = null;
      document.getElementById('selected-date').innerText = '日付を選択してください';
      document.getElementById('schedule-text').value = '';
    }
  }
 
  document.getElementById('save-schedule').addEventListener('click', () => {
    if (!selectedDayKey) return;
    const text = document.getElementById('schedule-text').value.trim();
    if (text) {
      schedules[selectedDayKey] = text;
    } else {
      delete schedules[selectedDayKey];
    }
    renderCalendar();
  });
 
  document.getElementById('clear-schedule').addEventListener('click', () => {
    if (!selectedDayKey) return;
    delete schedules[selectedDayKey];
    document.getElementById('schedule-text').value = '';
    renderCalendar();
  });
 
  document.getElementById('prev').addEventListener('click', () => { date.setMonth(date.getMonth() - 1); renderCalendar(); });
  document.getElementById('next').addEventListener('click', () => { date.setMonth(date.getMonth() + 1); renderCalendar(); });
 
  renderCalendar();
</script>
